spring.application.name=login
spring-boot.version=3.5.4
application.version=1.0

#default-path
#server.servlet.context-path=/api

#jwt-key
security.jwt.secret-key=AS12DF34GH56JK78LM90AS12DF34GH56JK78LM90AS12DF34GH56JK78LM90
#1hr in millisecond
security.jwt.expiration-time=3600000

#mongodb
#spring.data.mongodb.uri=mongodb://localhost:27017/bank

# ===============================
# MYSQL CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/bank?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#swagger
springdoc.show-actuator=true
server.port=8081
# ===============================
# REDIS CONFIG
# ===============================
spring.redis.host=localhost
spring.redis.port=6379
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Session TTL (5 minutes = 300000 ms)
session.ttl=300000

# ===============================
# KAFKA CONFIG
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=bank-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# ===============================
# SWAGGER CONFIG (OPTIONAL)
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html